<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <title>Shop</title>
    </head>
    <body>
        <header>
            <div class="container">
                <div id="header-top">
                    <div id="header-top-left">
                        <ul id="header-ul-left">
                            <li><img src="./icons/phone-call.png"/>+021-95-51-84</li>
                            <li><img src="./icons/mail.png"/>email@email.com</li>
                            <li><img src="./icons/location.png"/>1734 Stonecoal Road</li>
                        </ul>
                    </div>
                    <div id="header-top-right">
                        <ul id="header-ul-right">
                            <li><img src="./icons/dollar-symbol.png"/>USD</li>
                            <li><img src="./icons/person.png"/>My Account</li>
                        </ul>
                    </div>
                </div>
                <div id="header-bottom">
                    <div class="container">
                        <div id="header-bottom-logo">
                            <img src="./icons/logo.png"/>
                        </div>
                        <div id="header-bottom-input-div">
                            <select>
                                <option>All categories</option>
                                <option>Category1</option>
                                <option>Category2</option>
                            </select>
                            <input type="text" placeholder="Seach here">
                            <button>Search</button>
                        </div>
                        <div id="header-bottom-cart-div">
                            <div>
                                <img src="./icons/heart.png"/>
                                <span>Your wishlist</span>       
                            </div>
                            <div>
                                <img src="./icons/shopping-cart.png"/>
                                <span>Your Cart</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    </body>
</html>
