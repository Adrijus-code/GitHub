<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GoldDigger - Invest in gold with ease. Get live prices and make informed decisions.">
    <link rel="stylesheet" href="style.css">
    <title>GoldDigger</title>
</head>
 
<body>
    <main>
        <h1 class="title">GoldDigger</h1>
        <img src="gold.png" alt="gold bars and nuggets">
        <section class="price-info-container">
            <p>£<span id="price-display" class="price" aria-live="assertive">----.--</span> / Oz*</p>
            <p id="connection-status" class="status" aria-live="polite">Disconnected 🔴</p>
        </section>
        <form>
            <label for="investment-amount">Amount to invest</label>
            <div class="input-container">
                <div class="currency">£</div>
                <input type="number" id="investment-amount" name="goldAmount" placeholder="100.00" required>
            </div>
            <button id="invest-btn" class="invest-btn" aria-label="Invest in gold now">Invest Now!</button>
        </form>
        <!-- This dialog opens after a successful purchase -->
        <dialog class="outputs" role="dialog" aria-labelledby="dialog-title" aria-describedby="investment-summary" lang="en">
            <h2>Summary</h2>
            <p id="investment-summary">You just bought 1.3 ounces (ozt) for £3000. \n You will receive documentation shortly.</p>
                <button aria-label="Close dialog and return to main page" autofocus>OK</button>
        </dialog>
        <p class="footnote">* 1oz = 1 troy ounce of 24 Carat Gold</p>
    </main>
    <script type="module" src="index.js"></script>
</body>
</html>
