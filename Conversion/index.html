<!DOCTYPE html>
    <html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script src="index.js" defer></script>
        <title>Document</title>
    </head>
    <body>
        <div class="top-div">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input type="text" id="unit">
            <button class="button" id="unit-btn">Convert</button>
        </div>
        <div class="bottom-div">
            <div class="bot-divs">
                <h3>Length (Meter/Feet)</h3>
                <p class="p-element" id="length-p"></p>
            </div>
            <div class="bot-divs">
                <h3>Volume (Liters/Gallons)</h3>
                <p class="p-element" id="volume-p"></p>
            </div>
            <div class="bot-divs">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p class="p-element" id="mass-p"></p>
            </div>
        </div>
    </body>
</html>
